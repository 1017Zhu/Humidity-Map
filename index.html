<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4FA;--card:#fff;--border:rgba(0,0,0,0.08);
  --text:#1C2B4A;--muted:#64748B;--hint:#94A3B8;
  --navy:#1C2B4A;--blue:#378ADD;--blue-lt:#85B7EB;
  --green:#1D9E75;--amber:#EF9F27;
  --c-strong:#378ADD;--c-mid:#85B7EB;--c-dehumid:#1D9E75;--c-mixed:#EF9F27;
}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{background:var(--navy);position:sticky;top:0;z-index:200;display:flex;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-logo{color:#fff;font-size:13px;font-weight:600;padding:0 18px;white-space:nowrap;flex-shrink:0;border-right:1px solid rgba(255,255,255,.1);height:48px;display:flex;align-items:center}
.nav-btn{color:rgba(255,255,255,.6);font-size:12px;padding:0 13px;height:48px;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;border:none;background:none;transition:all .15s}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.07)}
.nav-btn.active{color:#fff;background:var(--blue)}
.nav-flag{font-size:15px}

/* PAGES */
.page{display:none;max-width:1100px;margin:0 auto;padding:22px 18px 52px}
.page.active{display:block}

/* OVERVIEW */
.hero-wrap{padding:6px 0 18px}
.hero-title{font-size:26px;font-weight:700;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--muted)}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:16px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:box-shadow .15s,transform .12s}
.ov-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.10);transform:translateY(-2px)}
.ov-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ov-flag{font-size:24px}
.ov-name{font-size:14px;font-weight:600}
.ov-sub{font-size:11px;color:var(--muted)}
.ov-pop{font-size:20px;font-weight:700;color:var(--blue);margin:6px 0}
.ov-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ov-chip{font-size:10px;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:4px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.tag-h{background:#E6F1FB;color:#0C447C}
.tag-d{background:#E1F5EE;color:#085041}
.tag-m{background:#FAEEDA;color:#633806}

/* COUNTRY PAGE */
.pg-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.pg-flag{font-size:34px;flex-shrink:0}
.pg-title{font-size:22px;font-weight:700;line-height:1.2}
.pg-sub{font-size:12px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:18px}
.kpi{border-radius:9px;padding:11px 13px}
.kpi .kl{font-size:11px;margin-bottom:3px}
.kpi .kv{font-size:18px;font-weight:700;line-height:1.1}
.kpi .ks{font-size:10px;margin-top:3px}
.kn{background:#F1F5F9}.kn .kl,.kn .ks{color:var(--muted)}.kn .kv{color:var(--text)}
.kb{background:#E6F1FB}.kb .kl,.kb .ks{color:#185FA5}.kb .kv{color:#0C447C}
.kg{background:#E1F5EE}.kg .kl,.kg .ks{color:#0F6E56}.kg .kv{color:#085041}
.ka{background:#FAEEDA}.ka .kl,.ka .ks{color:#854F0B}.ka .kv{color:#633806}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:680px){.two-col{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.card-ttl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:11px}

/* LEGEND */
.leg-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:9px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.leg-hint{font-size:10px;color:var(--hint);margin-left:4px}

/* MAP */
.map-outer{position:relative;border-radius:8px;overflow:hidden;background:#D6E8F5}
.map-tip{position:absolute;pointer-events:none;background:rgba(255,255,255,.97);border:1px solid rgba(0,0,0,.10);border-radius:8px;padding:8px 11px;font-size:12px;line-height:1.6;box-shadow:0 2px 12px rgba(0,0,0,.10);max-width:190px;opacity:0;transition:opacity .12s;z-index:10;color:var(--text)}

/* BAR */
.bar-outer{position:relative}

/* OII */
.oii-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-top:14px}
@media(max-width:680px){.oii-grid{grid-template-columns:1fr}}
.oii{border-radius:9px;padding:13px;border-left:4px solid}
.oii-o{background:#EEF3FB;border-color:#185FA5}
.oii-i{background:#E1F5EE;border-color:#0F6E56}
.oii-d{background:#FEF9EC;border-color:#BA7517}
.oii-lbl{font-size:11px;font-weight:700;margin-bottom:5px}
.oii-o .oii-lbl{color:#185FA5}
.oii-i .oii-lbl{color:#0F6E56}
.oii-d .oii-lbl{color:#BA7517}
.oii-txt{font-size:12.5px;line-height:1.65;color:var(--text)}
</style>
</head>

// ─── NAV ───
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const pid = btn.dataset.page;
    document.getElementById('page-' + pid).classList.add('active');
    if (pid !== 'overview' && !btn.dataset.built) {
      buildCountryPage(pid);
      btn.dataset.built = '1';
    }
  });
});

// ─── OVERVIEW ───
function buildOverview() {
  const grid = document.getElementById('ov-grid');
  Object.entries(COUNTRIES).forEach(([iso, c]) => {
    const tc = c.verdictType==='h'?'tag-h':c.verdictType==='d'?'tag-d':'tag-m';
    const div = document.createElement('div');
    div.className = 'ov-card';
    div.innerHTML = `
      <div class="ov-hdr"><div class="ov-flag">${c.flag}</div>
        <div><div class="ov-name">${c.name}</div><div class="ov-sub">${c.nameEn}</div></div></div>
      <span class="tag ${tc}">${c.verdict}</span>
      <div class="ov-pop">${c.totalPop.toLocaleString()}${c.unit}</div>
      <div class="ov-chips">
        <span class="ov-chip">${c.humidity}</span>
        <span class="ov-chip">${c.channel}</span>
      </div>`;
    div.addEventListener('click', () => gotoCountry(iso));
    grid.appendChild(div);
  });
}

function gotoCountry(iso) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`[data-page="${iso}"]`);
  btn.classList.add('active');
  document.getElementById('page-' + iso).classList.add('active');
  if (!btn.dataset.built) { buildCountryPage(iso); btn.dataset.built = '1'; }
}

// ─── COUNTRY PAGE ───

      <div class="leg"><div class="leg-dot" style="background:#85B7EB"></div>中等加湿需求</div>
      <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>除湿需求</div>
      <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>混合需求</div>
      <span class="leg-hint">省份颜色 = 需求类型 · 悬停查看人口</span>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-ttl">省级需求分布地图</div>
        <div class="map-outer" id="map-${iso}"></div>
      </div>
      <div class="card">
        <div class="card-ttl">各区域人口（万人）</div>
        <div class="bar-outer">
          <div style="position:relative;width:100%;height:${barH}px">
            <canvas id="bar-${iso}" role="img" aria-label="${c.name}区域人口分布"></canvas>
          </div>
        </div>
      </div>
    </div>
    <div class="oii-grid">
      <div class="oii oii-o"><div class="oii-lbl">Observation · 观察</div><div class="oii-txt">${c.obs}</div></div>
      <div class="oii oii-i"><div class="oii-lbl">Insight · 洞察</div><div class="oii-txt">${c.ins}</div></div>
      <div class="oii oii-d"><div class="oii-lbl">Idea · 建议</div><div class="oii-txt">${c.idea}</div></div>
    </div>`;

  setTimeout(() => { buildProvinceMap(iso, c); buildBar(iso, c); }, 30);
}

// ─── PROVINCE MAP (D3 with GeoJSON) ───
function buildProvinceMap(iso, c) {
  const wrap = document.getElementById('map-' + iso);
  if (!wrap || !GEO_DATA[iso]) return;

  const geojson = GEO_DATA[iso];
  const W = wrap.clientWidth || 420;

  // Compute bounding box from features
  let minLon=180, maxLon=-180, minLat=90, maxLat=-90;
  geojson.features.forEach(f => {
    const b = getBBox(f.geometry);
    minLon = Math.min(minLon, b[0]); maxLon = Math.max(maxLon, b[2]);
    minLat = Math.min(minLat, b[1]); maxLat = Math.max(maxLat, b[3]);
  });

  const lonSpan = maxLon - minLon, latSpan = maxLat - minLat;
  const aspect = latSpan / lonSpan;
  const H = Math.round(Math.min(Math.max(W * aspect * 1.05, 180), 480));
  wrap.style.height = H + 'px';

  const proj = d3.geoMercator()
    .fitExtent([[6,6],[W-6,H-6]], {type:'FeatureCollection', features: geojson.features});
  const path = d3.geoPath(proj);

  const svg = d3.select(wrap).append('svg')
    .attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%').style('display','block');

  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#D6E8F5');

  const tip = d3.select(wrap).append('div').attr('class','map-tip');

  // Find matching region data by approximate coordinate
  const sorted = [...c.regions].sort((a,b) => b.pop-a.pop);

  const fillFeat = (feat) => {
    const d = feat.properties.demand || 'strong';
    return COLOR[d];
  };

  svg.selectAll('path.province')
    .data(geojson.features)
    .join('path')
    .attr('class','province')
    .attr('d', path)
    .attr('fill', d => fillFeat(d))
    .attr('fill-opacity', 0.75)
    .attr('stroke','rgba(255,255,255,0.7)')
    .attr('stroke-width', 0.6)
    .style('cursor','pointer')
    .on('mouseenter', function(event, d) {
      d3.select(this).attr('fill-opacity',1).attr('stroke','rgba(255,255,255,1)').attr('stroke-width',1.5);
      const dtype = d.properties.demand || 'strong';
      const name = d.properties.name || '';
      // Find matching region by province name partial match
      const reg = c.regions.find(r => r.name.includes(name) || name.includes(r.name));
      const popStr = reg ? reg.pop + '万人' : '—';
      const sortedIdx = reg ? sorted.findIndex(s => s.name === reg.name) : -1;
      tip.html(`<strong style="font-size:13px;">${name}</strong><br/><span style="color:${COLOR[dtype]};font-weight:600;">${TYPE_LBL[dtype]}</span><br/>区域人口：<strong>${popStr}</strong>`)
        .style('opacity','1');
      if (sortedIdx >= 0) highlightBar(iso, sortedIdx);
    })
    .on('mousemove', function(event) {
      const rect = wrap.getBoundingClientRect();
      let l = event.clientX - rect.left + 12;
      let t = event.clientY - rect.top - 8;
      if (l + 195 > W) l = event.clientX - rect.left - 200;
      tip.style('left',l+'px').style('top',t+'px');
    })
    .on('mouseleave', function() {
      d3.select(this).attr('fill-opacity',0.75).attr('stroke','rgba(255,255,255,0.7)').attr('stroke-width',0.6);
      tip.style('opacity','0');
      resetBars(iso);
    });

  // Country border outline on top
  svg.append('path')
    .datum({type:'FeatureCollection', features: geojson.features})
    .attr('d', path)
    .attr('fill','none')
    .attr('stroke','rgba(44,74,127,0.5)')
    .attr('stroke-width',0.5);
}

function getBBox(geom) {
  let minx=180,miny=90,maxx=-180,maxy=-90;
  function processCoords(coords) {
    if (typeof coords[0] === 'number') {
      if(coords[0]<minx) minx=coords[0]; if(coords[0]>maxx) maxx=coords[0];
      if(coords[1]<miny) miny=coords[1]; if(coords[1]>maxy) maxy=coords[1];
    } else { coords.forEach(processCoords); }
  }
  processCoords(geom.coordinates);
  return [minx,miny,maxx,maxy];
}

// ─── BAR CHART ───
function buildBar(iso, c) {
  const canvas = document.getElementById('bar-' + iso);
  if (!canvas) return;
  const sorted = [...c.regions].sort((a,b) => b.pop-a.pop);

  const chart = new Chart(canvas, {
    type:'bar',
    data:{
      labels: sorted.map(r => [r.name]),
      datasets:[{
        data: sorted.map(r => r.pop),
        backgroundColor: sorted.map(r => COLOR[r.type]),
        borderColor: sorted.map(r => COLOR_BDR[r.type]),
        borderWidth:1, borderRadius:3
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      indexAxis:'y',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          label: ctx => ` ${ctx.raw}万人`,
          afterLabel: ctx => ' ' + TYPE_LBL[sorted[ctx.dataIndex].type]
        }}
      },
      onHover:(evt,els) => { if(els.length) highlightBar(iso,els[0].index); else resetBars(iso); },
      scales:{
        x:{ticks:{color:'#94A3B8',font:{size:10},callback:v=>v+'万'},grid:{color:'rgba(0,0,0,0.05)'}},
        y:{ticks:{color:'#64748B',font:{size:10.5}},grid:{display:false}}
      }
    }
  });
  barCharts[iso] = {chart, sorted};
}

function highlightBar(iso, idx) {
  const bc = barCharts[iso]; if(!bc) return;
  const {chart, sorted} = bc;
  chart.data.datasets[0].backgroundColor = sorted.map((r,i) => i===idx ? COLOR[r.type] : COLOR[r.type]+'44');
  chart.data.datasets[0].borderColor = sorted.map((r,i) => i===idx ? COLOR_BDR[r.type] : COLOR[r.type]+'66');
  chart.update('none');
}
function resetBars(iso) {
  const bc = barCharts[iso]; if(!bc) return;
  const {chart, sorted} = bc;
  chart.data.datasets[0].backgroundColor = sorted.map(r => COLOR[r.type]);
  chart.data.datasets[0].borderColor = sorted.map(r => COLOR_BDR[r.type]);
  chart.update('none');
}

buildOverview();
</script>
